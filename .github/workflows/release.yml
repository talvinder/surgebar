name: Release to PyPI

# Publishes a wheel + sdist to PyPI whenever a version tag is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token in repo secrets.
#
# One-time setup on PyPI:
#   1. Create the project on https://pypi.org (after first manual upload, or
#      reserve the name with `python -m twine upload --skip-existing`).
#   2. PyPI project → "Manage" → "Publishing" → "Add a new publisher"
#         Owner:               talvinder
#         Repository name:     surgebar
#         Workflow name:       release.yml
#         Environment name:    pypi
#   3. Push a tag: `git tag v0.1.0 && git push origin v0.1.0`

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Verify version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg_version=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$tag" != "$pkg_version" ]; then
            echo "Tag $tag does not match pyproject version $pkg_version"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/surgebar/
    permissions:
      id-token: write   # required for Trusted Publishing OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
